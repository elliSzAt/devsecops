name: DevSecOps Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  APP_DIR: ./app
  REPORT_DIR: ./reports
  IMAGE_NAME: devsecops-app
  REGISTRY: ${{ vars.REGISTRY_URL || 'localhost:5000' }}
  DEPLOY_COMPOSE_FILE: docker-compose.yml
  APP_URL: http://localhost:3000
  # Pinned tool versions - tránh supply chain attack qua :latest
  GITLEAKS_VERSION: "v8.18.2"
  SEMGREP_VERSION: "1.90.0"
  DC_VERSION: "11.0.0"
  TRIVY_VERSION: "0.58.0"
  ZAP_VERSION: "2.16.0"

jobs:
  # ================================================================
  # STAGE 1: SAST - Gitleaks + Semgrep
  # Chạy trực tiếp Docker image, cache trên self-hosted runner
  # ================================================================
  sast:
    name: "SAST (Gitleaks + Semgrep)"
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create reports directory
        run: mkdir -p ${{ env.REPORT_DIR }}

      - name: Gitleaks - Secret Scanning
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/src:ro \
            -v ${{ github.workspace }}/reports:/src/reports \
            zricethezav/gitleaks:${{ env.GITLEAKS_VERSION }} \
            detect \
            --source=/src \
            --report-format=json \
            --report-path=/src/reports/gitleaks-report.json \
            --exit-code=1 \
          && echo "No secrets found." \
          || { echo "PIPELINE BLOCKED: Secrets detected!"; exit 1; }

      - name: Verify Semgrep config exists
        run: |
          if [ ! -f "security/semgrep/.semgrep.yml" ]; then
            echo "ERROR: security/semgrep/.semgrep.yml not found!"
            ls -la security/semgrep/ 2>/dev/null || echo "Directory security/semgrep/ does not exist"
            exit 1
          fi
          echo "Config file found."

      - name: Semgrep - Code Scanning
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/src \
            --entrypoint semgrep \
            semgrep/semgrep:${{ env.SEMGREP_VERSION }} \
            scan \
            --config /src/security/semgrep/.semgrep.yml \
            --config "p/ci" \
            --metrics=off \
            --json \
            --output /src/reports/sast-report.json \
            /src/app/src/ \
          || true

          if [ ! -f "reports/sast-report.json" ]; then
            echo "ERROR: No Semgrep report generated!"
            exit 1
          fi

          ERRORS=$(python3 -c "
          import json
          with open('reports/sast-report.json') as f:
              data = json.load(f)
              errors = [r for r in data.get('results', []) if r.get('extra', {}).get('severity', '') == 'ERROR']
              print(len(errors))
          " 2>/dev/null || echo "0")

          echo "High/Critical findings: ${ERRORS}"
          if [ "$ERRORS" -gt 0 ]; then
            echo "PIPELINE BLOCKED: ${ERRORS} High/Critical SAST findings!"
            exit 1
          fi

      - name: Upload SAST Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-reports
          path: |
            reports/gitleaks-report.json
            reports/sast-report.json
          retention-days: 30

  # ================================================================
  # STAGE 2: Build, Test & Dependency Scan (OWASP Dependency-Check)
  # npm ci -> node_modules -> dependency-check scan folder đó
  # ================================================================
  build-and-test:
    name: "Build, Test & Dependency Scan"
    runs-on: self-hosted
    needs: sast
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
        continue-on-error: true

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('app/package-lock.json', 'app/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies (npm ci -> node_modules)
        working-directory: ${{ env.APP_DIR }}
        run: npm ci

      - name: Run tests
        working-directory: ${{ env.APP_DIR }}
        run: npm run test:ci

      - name: Create reports directory
        run: mkdir -p ${{ env.REPORT_DIR }}

      - name: OWASP Dependency-Check (scan node_modules)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/app:/src:ro \
            -v ${{ github.workspace }}/reports:/report \
            owasp/dependency-check-action:${{ env.DC_VERSION }} \
            --scan /src \
            --format JSON \
            --format HTML \
            --out /report \
            --project "devsecops-app" \
            --disableAssembly \
            --nodeAuditSkipDevDependencies \
            --noupdate \
          || true

          DC_REPORT="reports/dependency-check-report.json"
          if [ ! -f "$DC_REPORT" ]; then
            echo "ERROR: No Dependency-Check report generated!"
            exit 1
          fi

          RESULT=$(python3 -c "
          import json
          with open('${DC_REPORT}') as f:
              data = json.load(f)
              c = h = 0
              for dep in data.get('dependencies', []):
                  for v in dep.get('vulnerabilities', []):
                      sev = v.get('severity', '').upper()
                      if sev == 'CRITICAL': c += 1
                      elif sev == 'HIGH': h += 1
              print(f'{c} {h}')
          ")

          CRITICAL=$(echo "$RESULT" | awk '{print $1}')
          HIGH=$(echo "$RESULT" | awk '{print $2}')
          echo "Critical: ${CRITICAL}, High: ${HIGH}"

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "PIPELINE BLOCKED: ${CRITICAL} Critical + ${HIGH} High dependency vulnerabilities!"
            exit 1
          fi

      - name: Upload Dependency-Check Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-reports
          path: |
            reports/dependency-check-report.json
            reports/dependency-check-report.html
          retention-days: 30

  # ================================================================
  # STAGE 3: Build Docker Image
  # ================================================================
  build-image:
    name: "Build Docker Image"
    runs-on: self-hosted
    needs: build-and-test
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_full: ${{ steps.meta.outputs.image_full }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "image_tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "image_full=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            -f app/Dockerfile \
            ./app

      - name: Verify image
        run: docker images ${{ env.IMAGE_NAME }} --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"

  # ================================================================
  # STAGE 4: Container Image Scan (Trivy)
  # Chạy trực tiếp Trivy Docker image
  # ================================================================
  scan-image:
    name: "Container Scan (Trivy)"
    runs-on: self-hosted
    needs: build-image
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create reports directory
        run: mkdir -p ${{ env.REPORT_DIR }}

      - name: Trivy Image Scan
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v ${{ github.workspace }}/reports:/output \
            -v ${{ github.workspace }}/.trivyignore:/root/.trivyignore:ro \
            aquasec/trivy:${{ env.TRIVY_VERSION }} \
            image \
            --format json \
            --output /output/container-scan-report.json \
            --severity CRITICAL,HIGH,MEDIUM \
            --ignorefile /root/.trivyignore \
            ${{ env.IMAGE_NAME }}:${{ needs.build-image.outputs.image_tag }}

          RESULT=$(python3 -c "
          import json
          with open('reports/container-scan-report.json') as f:
              data = json.load(f)
              c = h = 0
              for r in data.get('Results', []):
                  for v in r.get('Vulnerabilities', []):
                      sev = v.get('Severity', '').upper()
                      if sev == 'CRITICAL': c += 1
                      elif sev == 'HIGH': h += 1
              print(f'{c} {h}')
          ")

          CRITICAL=$(echo "$RESULT" | awk '{print $1}')
          HIGH=$(echo "$RESULT" | awk '{print $2}')
          echo "Critical: ${CRITICAL}, High: ${HIGH}"

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "PIPELINE BLOCKED: ${CRITICAL} Critical + ${HIGH} High in container image!"
            exit 1
          fi

      - name: Upload Container Scan Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-scan-report
          path: reports/container-scan-report.json
          retention-days: 30

  # ================================================================
  # STAGE 5: Push Image to Registry
  # ================================================================
  push-image:
    name: "Push Image to Registry"
    runs-on: self-hosted
    needs: [build-image, scan-image]
    steps:
      - name: Login to Registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | \
            docker login ${{ env.REGISTRY }} \
              -u "${{ secrets.REGISTRY_USERNAME }}" \
              --password-stdin

      - name: Tag and Push image
        env:
          IMAGE_TAG: ${{ needs.build-image.outputs.image_tag }}
          IMAGE_FULL: ${{ needs.build-image.outputs.image_full }}
        run: |
          docker tag ${{ env.IMAGE_NAME }}:${IMAGE_TAG} ${IMAGE_FULL}
          docker tag ${{ env.IMAGE_NAME }}:${IMAGE_TAG} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${IMAGE_FULL}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          echo "Pushed: ${IMAGE_FULL}"

  # ================================================================
  # STAGE 6: Deploy
  # ================================================================
  deploy:
    name: "Deploy Application"
    runs-on: self-hosted
    needs: [build-image, push-image]
    environment: staging
    outputs:
      previous_image: ${{ steps.save-state.outputs.previous_image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Save current deployment state (for rollback)
        id: save-state
        run: |
          PREV=$(docker inspect devsecops-app --format='{{.Config.Image}}' 2>/dev/null || echo "none")
          echo "previous_image=${PREV}" >> $GITHUB_OUTPUT
          echo "Previous image: ${PREV}"

      - name: Deploy with Docker Compose
        env:
          IMAGE_TAG: ${{ needs.build-image.outputs.image_tag }}
        run: bash pipeline/scripts/deploy.sh

      - name: Health check
        run: |
          echo "Waiting for application to be ready..."
          for i in $(seq 1 30); do
            if curl -sf ${{ env.APP_URL }} > /dev/null 2>&1; then
              echo "Application is healthy!"
              exit 0
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 2
          done
          echo "Application failed health check!"
          exit 1

  # ================================================================
  # STAGE 7: DAST Scan (OWASP ZAP)
  # Chạy trực tiếp ZAP Docker image
  # ================================================================
  dast:
    name: "DAST Scan (OWASP ZAP)"
    runs-on: self-hosted
    needs: deploy
    steps:
      - name: Create reports directory
        run: mkdir -p ${{ env.REPORT_DIR }}

      - name: Resolve app container IP
        id: app-info
        run: |
          APP_IP=$(docker inspect devsecops-app --format='{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' 2>/dev/null || echo "")
          APP_NETWORK=$(docker inspect devsecops-app --format='{{range $k,$v := .NetworkSettings.Networks}}{{$k}}{{end}}' 2>/dev/null || echo "")
          if [ -n "$APP_IP" ]; then
            echo "target=http://${APP_IP}:3000" >> $GITHUB_OUTPUT
            echo "network=--network ${APP_NETWORK}" >> $GITHUB_OUTPUT
          else
            echo "target=${{ env.APP_URL }}" >> $GITHUB_OUTPUT
            echo "network=" >> $GITHUB_OUTPUT
          fi
          echo "Target: $(cat $GITHUB_OUTPUT | grep target)"

      - name: OWASP ZAP Baseline Scan
        run: |
          docker run --rm \
            ${{ steps.app-info.outputs.network }} \
            -v ${{ github.workspace }}/reports:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:${{ env.ZAP_VERSION }} \
            zap-baseline.py \
            -t ${{ steps.app-info.outputs.target }} \
            -J dast-report.json \
            -r dast-report.html \
            -l WARN \
            -I \
          || true

          if [ ! -f "reports/dast-report.json" ]; then
            echo "ERROR: No DAST report generated!"
            exit 1
          fi

          HIGH=$(python3 -c "
          import json
          with open('reports/dast-report.json') as f:
              data = json.load(f)
              high = sum(1 for s in data.get('site', []) for a in s.get('alerts', []) if a.get('riskdesc', '').startswith('High'))
              print(high)
          " 2>/dev/null || echo "0")

          echo "High-risk alerts: ${HIGH}"
          if [ "$HIGH" -gt 0 ]; then
            echo "PIPELINE BLOCKED: ${HIGH} High-risk vulnerabilities! Triggering ROLLBACK."
            exit 1
          fi

      - name: Upload DAST Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-report
          path: |
            reports/dast-report.json
            reports/dast-report.html
          retention-days: 30

  # ================================================================
  # STAGE 8: Rollback (only if DAST fails)
  # ================================================================
  rollback:
    name: "Rollback Deployment"
    runs-on: self-hosted
    needs: [deploy, dast]
    if: ${{ always() && needs.dast.result == 'failure' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rollback to previous version
        env:
          PREVIOUS_IMAGE: ${{ needs.deploy.outputs.previous_image }}
        run: bash pipeline/scripts/rollback.sh
